<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>石意 POS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;background:#f0f2f5;color:#1a1a1a;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.hdr{background:#2c6e49;color:#fff;padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-back{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:0.95rem;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.hdr-back.show{display:flex}
.hdr-title{font-size:1rem;font-weight:700;flex:1}

.body-row{flex:1;display:flex;overflow:hidden}

/* LEFT */
.left-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8e8e8;flex-shrink:0}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:0.78rem;font-weight:600;color:#888;border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;font-family:inherit}
.tab.active{color:#2c6e49;border-bottom-color:#2c6e49}
.search-wrap{padding:7px 10px;background:#fff;border-bottom:1px solid #eee;flex-shrink:0}
.search-wrap input{width:100%;padding:7px 12px;border:1.5px solid #ddd;border-radius:20px;font-size:0.82rem;font-family:inherit;outline:none;background:#f8f8f8}
.search-wrap input:focus{border-color:#2c6e49;background:#fff}
.main{flex:1;overflow-y:auto;overscroll-behavior:contain}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}
.cat-card{background:#fff;border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,0.07);border:2px solid transparent;-webkit-user-select:none;user-select:none;min-height:72px;justify-content:center}
.cat-card:active{background:#f0f8f4;border-color:#2c6e49}
.cat-label{font-size:0.76rem;font-weight:700;text-align:center;color:#1a1a1a;line-height:1.35}
.cat-count{font-size:0.65rem;color:#aaa;background:#f5f5f5;padding:2px 6px;border-radius:8px}

/* Source chips */
.src-chip{display:inline-block;font-size:0.6rem;padding:1px 5px;border-radius:6px;font-weight:600;margin-left:3px;vertical-align:middle}
.src-1kg{background:#e8f5e9;color:#2c6e49}
.src-cp{background:#e3f2fd;color:#1565c0}

/* Product groups */
.prod-section{padding:8px}
.prod-group{background:#fff;border-radius:10px;margin-bottom:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.pg-header{padding:11px 12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.pg-name{font-size:0.86rem;font-weight:700;flex:1;color:#1a1a1a;line-height:1.3}
.pg-toggle{font-size:0.65rem;color:#bbb;transition:transform 0.2s;flex-shrink:0}
.pg-toggle.open{transform:rotate(180deg)}
.pg-items{display:none;border-top:1px solid #f5f5f5}
.pg-items.open{display:block}
.pg-item{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #f5f5f5;gap:8px;cursor:pointer}
.pg-item:last-child{border-bottom:none}
.pg-item:active{background:#f9f9f9}
.pi-spec{flex:1;font-size:0.76rem;color:#555;min-width:0;line-height:1.4}
.pi-code{font-size:0.62rem;color:#ccc;display:block}
.pi-price{font-size:0.86rem;font-weight:700;color:#2c6e49;white-space:nowrap;margin-right:6px;text-align:right}
.pi-unit{font-size:0.62rem;color:#aaa;display:block}
.add-btn{background:#2c6e49;color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit}
.pg-single{padding:11px 12px;display:flex;align-items:center;gap:8px;cursor:pointer}
.pg-single:active{background:#f9f9f9}
.ps-info{flex:1;min-width:0}
.ps-name{font-size:0.86rem;font-weight:700;color:#1a1a1a;line-height:1.3}
.ps-spec{font-size:0.72rem;color:#aaa;margin-top:2px}
.ps-price{text-align:right;margin-right:6px;flex-shrink:0}
.ps-price .amt{font-size:0.86rem;font-weight:700;color:#2c6e49;white-space:nowrap}
.ps-price .unt{font-size:0.62rem;color:#aaa}
.empty{text-align:center;padding:40px 16px;color:#ccc;font-size:0.85rem}

/* RIGHT: permanent cart */
.cart-col{width:42%;max-width:200px;min-width:130px;background:#fff;display:flex;flex-direction:column;border-left:1px solid #e8e8e8;flex-shrink:0}
.cart-col-hdr{padding:10px 10px 8px;border-bottom:1px solid #eee;flex-shrink:0}
.cart-col-hdr h2{font-size:0.88rem;font-weight:700;color:#1a1a1a}
.cart-col-list{flex:1;overflow-y:auto;padding:6px 8px}
.ci{padding:7px 0;border-bottom:1px solid #f5f5f5}
.ci:last-child{border-bottom:none}
.ci-name{font-size:0.75rem;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-spec{font-size:0.65rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ci-sub{font-size:0.72rem;color:#2c6e49;font-weight:600;margin-top:2px}
.ci-ctrl{display:flex;align-items:center;gap:4px;margin-top:4px}
.qb{background:#f0f0f0;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.qv{font-size:0.78rem;font-weight:700;min-width:20px;text-align:center}
.del{background:none;border:none;color:#e63946;font-size:0.82rem;cursor:pointer;padding:2px;margin-left:auto}
.cart-empty{text-align:center;padding:30px 8px;color:#ccc;font-size:0.75rem}
.cart-col-foot{padding:8px 10px;border-top:2px solid #eee;flex-shrink:0}
.total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.total-label{font-size:0.75rem;color:#888}
.total-amt{font-size:1rem;font-weight:800;color:#2c6e49}
.btn-checkout{width:100%;padding:10px;background:#2c6e49;color:#fff;border:none;border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:inherit;font-weight:700;margin-bottom:5px}
.btn-clear{width:100%;padding:7px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:0.75rem;cursor:pointer;font-family:inherit;color:#888}

/* Qty modal */
.qm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.qm-overlay.open{display:flex}
.qm-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 18px;width:100%;max-width:500px}
.qm-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.qm-desc{font-size:0.82rem;color:#888;margin-bottom:14px;line-height:1.6}
.qm-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.qm-row label{font-size:0.85rem;color:#555;white-space:nowrap}
.qm-input{flex:1;padding:10px;border:2px solid #2c6e49;border-radius:8px;font-size:1.1rem;font-family:inherit;text-align:center}
.qm-unit{font-size:0.85rem;color:#888;white-space:nowrap}
.qm-btns{display:flex;gap:10px}
.qm-btns button{flex:1;padding:13px;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.qm-cancel{background:#f0f0f0;color:#555}
.qm-ok{background:#2c6e49;color:#fff}

/* Receipt */
.receipt-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.receipt-overlay.open{display:flex}
.receipt-box{background:#fff;border-radius:16px;width:100%;max-width:380px;max-height:85dvh;overflow-y:auto;padding:20px}
.receipt-box h2{text-align:center;font-size:1.05rem;margin-bottom:4px}
.rdate{text-align:center;font-size:0.72rem;color:#aaa;margin-bottom:14px}
hr.dash{border:none;border-top:1px dashed #ddd;margin:10px 0}
.rrow{display:flex;justify-content:space-between;font-size:0.8rem;padding:4px 0;gap:8px}
.rn{flex:1;color:#333}
.ra{font-weight:600;white-space:nowrap}
.rtotal{display:flex;justify-content:space-between;font-size:1.05rem;font-weight:800;padding:8px 0;color:#2c6e49}
.btn-rclose{width:100%;margin-top:14px;padding:12px;background:#2c6e49;color:#fff;border:none;border-radius:10px;font-size:0.95rem;cursor:pointer;font-family:inherit;font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <button class="hdr-back" id="backBtn" onclick="goBack()">&#9664;</button>
  <div class="hdr-title" id="hdrTitle">石意 POS 系統</div>
</div>

<div class="body-row">
  <div class="left-col">
    <div class="tabs">
      <button class="tab active" data-tab="a" onclick="switchTab(this)">A 價</button>
      <button class="tab" data-tab="b" onclick="switchTab(this)">B 價</button>
      <button class="tab" data-tab="cp" onclick="switchTab(this)">CP 價格</button>
    </div>
    <div class="search-wrap" id="searchWrap" style="display:none">
      <input type="text" id="searchInput" placeholder="搜尋..." oninput="onSearch()" autocomplete="off" autocorrect="off" autocapitalize="off">
    </div>
    <div class="main" id="mainArea"></div>
  </div>

  <div class="cart-col">
    <div class="cart-col-hdr"><h2>購物車</h2></div>
    <div class="cart-col-list" id="cartList"><div class="cart-empty">尚無商品</div></div>
    <div class="cart-col-foot">
      <div class="total-row">
        <span class="total-label">合計</span>
        <span class="total-amt" id="totalAmt">NT$0</span>
      </div>
      <button class="btn-checkout" onclick="showReceipt()">結帳</button>
      <button class="btn-clear" onclick="clearCart()">清空</button>
    </div>
  </div>
</div>

<div class="qm-overlay" id="qmOverlay" onclick="if(event.target===this)closeQM()">
  <div class="qm-box">
    <div class="qm-title" id="qmTitle"></div>
    <div class="qm-desc" id="qmDesc"></div>
    <div class="qm-row">
      <label>數量 / 重量</label>
      <input type="number" class="qm-input" id="qmInput" value="1" min="0.01" step="0.1">
      <span class="qm-unit" id="qmUnit">個</span>
    </div>
    <div class="qm-btns">
      <button class="qm-cancel" onclick="closeQM()">取消</button>
      <button class="qm-ok" onclick="confirmAdd()">加入購物車</button>
    </div>
  </div>
</div>

<div class="receipt-overlay" id="receiptOverlay">
  <div class="receipt-box" id="receiptBox"></div>
</div>

let currentTab='a', currentCat=null, searchMode=false, pendingItem=null, cart=[];

function switchTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=el.dataset.tab;
  goBack();
}

function getProds(){return DATA[currentTab]||[];}

function groupByName(prods){
  const map=new Map();
  prods.forEach(p=>{
    const key=p.name+'|'+(p.source||'');
    if(!map.has(key)) map.set(key,{name:p.name,source:p.source,items:[]});
    map.get(key).items.push(p);
  });
  return map;
}

function renderCatGrid(){
  currentCat=null; searchMode=false;
  document.getElementById('searchWrap').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('hdrTitle').textContent='石意 POS 系統';
  const catMap=new Map();
  getProds().forEach(p=>{
    const c=p.category||p.source||'其他';
    catMap.set(c,(catMap.get(c)||0)+1);
  });
  let html=`<div style="padding:8px 8px 2px">
    <div onclick="openSearch()" style="background:#fff;border-radius:10px;padding:9px 14px;display:flex;align-items:center;gap:6px;color:#aaa;font-size:0.82rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.07)">
      &#128269; 搜尋商品...
    </div></div><div class="cat-grid">`;
  for(const [cat,cnt] of catMap){
    html+=`<div class="cat-card" onclick="openCat('${esc(cat)}')">
      <div class="cat-label">${cat}</div>
      <div class="cat-count">${cnt} 項</div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function openSearch(){
  searchMode=true; currentCat=null;
  document.getElementById('searchWrap').style.display='block';
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('hdrTitle').textContent='搜尋';
  document.getElementById('mainArea').innerHTML='<div class="empty">輸入關鍵字搜尋</div>';
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}

function onSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){document.getElementById('mainArea').innerHTML='<div class="empty">輸入關鍵字搜尋</div>';return;}
  const prods=getProds().filter(p=>
    (p.name||'').toLowerCase().includes(q)||
    (p.spec||'').toLowerCase().includes(q)||
    (p.code||'').toLowerCase().includes(q)
  );
  renderGroups(prods);
}

function openCat(cat){
  currentCat=cat; searchMode=false;
  document.getElementById('searchWrap').style.display='none';
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('hdrTitle').textContent=cat;
  const prods=getProds().filter(p=>(p.category||p.source||'其他')===cat);
  renderGroups(prods);
}

function renderGroups(prods){
  if(!prods.length){document.getElementById('mainArea').innerHTML='<div class="empty">沒有商品</div>';return;}
  const groups=groupByName(prods);
  let html='<div class="prod-section">'; let gi=0;
  for(const [,g] of groups){
    const{name,source,items}=g;
    const gid='g'+gi;
    const srcChip=source?`<span class="src-chip ${source==='CP 1kg'?'src-1kg':'src-cp'}">${source}</span>`:'';
    if(items.length===1){
      const p=items[0];
      html+=`<div class="prod-group"><div class="pg-single" onclick="openQM(${jstr(p)})">
        <div class="ps-info">
          <div class="ps-name">${name}${srcChip}</div>
          ${p.spec?`<div class="ps-spec">${p.spec}</div>`:''}
        </div>
        <div class="ps-price"><div class="amt">NT$${fmt(p.price)}</div><div class="unt">/${p.unit||'個'}</div></div>
        <button class="add-btn" onclick="event.stopPropagation();quickAdd(${jstr(p)})">+</button>
      </div></div>`;
    } else {
      html+=`<div class="prod-group">
        <div class="pg-header" onclick="toggleGroup('${gid}')">
          <div class="pg-name">${name}${srcChip}</div>
          <div style="font-size:0.65rem;color:#bbb;margin-right:3px">${items.length} 種</div>
          <div class="pg-toggle" id="arr_${gid}">&#9660;</div>
        </div>
        <div class="pg-items" id="${gid}">`;
      items.forEach(p=>{
        html+=`<div class="pg-item" onclick="openQM(${jstr(p)})">
          <div class="pi-spec">${p.spec||'一般'}<span class="pi-code">${p.code||''}</span></div>
          <div style="text-align:right"><div class="pi-price">NT$${fmt(p.price)}<div class="pi-unit">/${p.unit||'個'}</div></div></div>
          <button class="add-btn" onclick="event.stopPropagation();quickAdd(${jstr(p)})">+</button>
        </div>`;
      });
      html+=`</div></div>`;
    }
    gi++;
  }
  html+='</div>';
  document.getElementById('mainArea').innerHTML=html;
  document.getElementById('mainArea').scrollTop=0;
}

function jstr(p){return JSON.stringify(p).replace(/"/g,'&quot;');}
function toggleGroup(id){document.getElementById(id).classList.toggle('open');document.getElementById('arr_'+id).classList.toggle('open');}
function goBack(){document.getElementById('searchInput').value='';renderCatGrid();}
function fmt(n){if(!n&&n!==0)return '?';return n%1===0?n:n.toFixed(1);}

function quickAdd(p){addToCart(p,1);}
function openQM(p){
  pendingItem=p;
  document.getElementById('qmTitle').textContent=p.name;
  document.getElementById('qmDesc').innerHTML=
    (p.spec?'規格：'+p.spec+'<br>':'')+
    '單價：<strong>NT$'+fmt(p.price)+'</strong> / '+(p.unit||'個')+
    (p.code?'<br><span style="color:#ccc">'+p.code+'</span>':'');
  document.getElementById('qmUnit').textContent=p.unit||'個';
  document.getElementById('qmInput').value='1';
  document.getElementById('qmOverlay').classList.add('open');
  setTimeout(()=>{const i=document.getElementById('qmInput');i.focus();i.select();},150);
}
function closeQM(){document.getElementById('qmOverlay').classList.remove('open');pendingItem=null;}
function confirmAdd(){
  if(!pendingItem)return;
  const qty=parseFloat(document.getElementById('qmInput').value);
  if(isNaN(qty)||qty<=0){alert('請輸入有效數量');return;}
  addToCart(pendingItem,qty); closeQM();
}

function addToCart(p,qty){
  const key=(p.code||p.name)+'_'+currentTab+'_'+(p.source||'');
  const ex=cart.find(c=>c.key===key);
  if(ex){ex.qty=parseFloat((ex.qty+qty).toFixed(3));}
  else{cart.push({...p,qty,key,tab:currentTab});}
  renderCart();
}

function renderCart(){
  const el=document.getElementById('cartList');
  if(!cart.length){el.innerHTML='<div class="cart-empty">尚無商品</div>';document.getElementById('totalAmt').textContent='NT$0';return;}
  el.innerHTML=cart.map((c,i)=>{
    const sub=c.price*c.qty;
    return `<div class="ci">
      <div class="ci-name">${c.name}</div>
      <div class="ci-spec">${c.spec||''}</div>
      <div class="ci-sub">NT$${fmt(sub)}</div>
      <div class="ci-ctrl">
        <button class="qb" onclick="cqty(${i},-0.1)">−</button>
        <span class="qv">${fmt(c.qty)}</span>
        <button class="qb" onclick="cqty(${i},0.1)">+</button>
        <span style="font-size:0.62rem;color:#aaa">${c.unit||''}</span>
        <button class="del" onclick="cdel(${i})">&#10005;</button>
      </div>
    </div>`;
  }).join('');
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  document.getElementById('totalAmt').textContent='NT$'+fmt(total);
}
function cqty(i,d){cart[i].qty=Math.max(0.1,parseFloat((cart[i].qty+d).toFixed(3)));renderCart();}
function cdel(i){cart.splice(i,1);renderCart();}
function clearCart(){if(!cart.length)return;if(confirm('確定清空購物車？')){cart=[];renderCart();}}

function showReceipt(){
  if(!cart.length){alert('購物車是空的');return;}
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const now=new Date().toLocaleString('zh-TW');
  const rows=cart.map(c=>{
    const sub=c.price*c.qty;
    return `<div class="rrow">
      <span class="rn">${c.name}${c.spec?' ('+c.spec+')':''}<br>
        <span style="color:#bbb;font-size:0.68rem">NT$${fmt(c.price)}×${fmt(c.qty)}${c.unit||''} [${c.tab.toUpperCase()}${c.source?' '+c.source:''}]</span>
      </span><span class="ra">NT$${fmt(sub)}</span></div>`;
  }).join('');
  document.getElementById('receiptBox').innerHTML=
    '<h2>結帳明細</h2><div class="rdate">'+now+'</div>'+
    '<hr class="dash">'+rows+'<hr class="dash">'+
    '<div class="rtotal"><span>合計</span><span>NT$'+fmt(total)+'</span></div>'+
    '<button class="btn-rclose" onclick="document.getElementById(\'receiptOverlay\').classList.remove(\'open\')">關閉</button>';
  document.getElementById('receiptOverlay').classList.add('open');
}

renderCatGrid();
</script>
</body>
</html>
